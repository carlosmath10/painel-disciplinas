<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Disciplinas · Prof. Carlos Augusto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafbfc;
  --bg-warm: #f5f3f0;
  --surface: #ffffff;
  --surface-hover: #f8f9fa;
  --accent: #1a56db;
  --accent-light: #e8eefb;
  --accent-soft: rgba(26,86,219,.07);
  --success: #059669;
  --success-light: #ecfdf5;
  --warn: #d97706;
  --warn-light: #fffbeb;
  --danger: #dc2626;
  --danger-light: #fef2f2;
  --text: #1a1a2e;
  --text-secondary: #4a5568;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --border-light: #f0f1f3;
  --input-bg: #f9fafb;
  --student: #7c3aed;
  --student-light: #f3f0ff;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.08);
  --radius: 10px;
  --radius-lg: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', -apple-system, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

.animate { animation: fadeIn .35s ease; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* ─── BUTTONS ─── */
.btn {
  border: none; border-radius: 8px; cursor: pointer; font-family: 'Outfit', sans-serif;
  font-weight: 600; display: inline-flex; align-items: center; gap: 7px;
  transition: all .15s ease; font-size: 14px; padding: 9px 18px;
  letter-spacing: -.01em;
}
.btn:hover:not(:disabled) { transform: translateY(-1px); }
.btn:active:not(:disabled) { transform: translateY(0); }
.btn:disabled { opacity: .45; cursor: default; }

.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 3px rgba(26,86,219,.25); }
.btn-primary:hover:not(:disabled) { box-shadow: 0 4px 12px rgba(26,86,219,.3); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { background: var(--surface-hover); border-color: var(--text-muted); }
.btn-danger { background: var(--danger-light); color: var(--danger); }
.btn-ghost { background: transparent; color: var(--text-secondary); padding: 7px 12px; }
.btn-ghost:hover { background: var(--border-light); }
.btn-student { background: var(--student); color: #fff; box-shadow: 0 1px 3px rgba(124,58,237,.25); }
.btn-sm { padding: 6px 13px; font-size: 13px; }
.btn-icon { padding: 6px; border-radius: 6px; }

/* ─── INPUTS ─── */
.input, .select, textarea {
  background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; color: var(--text); font-family: 'Outfit', sans-serif;
  font-size: 14px; outline: none; width: 100%; transition: all .15s;
}
.input:focus, .select:focus, textarea:focus {
  border-color: var(--accent); background: #fff;
  box-shadow: 0 0 0 3px var(--accent-light);
}
.select {
  appearance: none; cursor: pointer; padding-right: 36px;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239ca3af' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 14px center;
}
textarea { resize: vertical; line-height: 1.6; }
.label { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; display: block; }

/* ─── CARD ─── */
.card {
  background: var(--surface); border: 1px solid var(--border-light); border-radius: var(--radius-lg);
  padding: 24px; box-shadow: var(--shadow-sm); transition: all .2s ease;
}
.card-hover:hover {
  border-color: var(--border); box-shadow: var(--shadow-md);
  transform: translateY(-2px); cursor: pointer;
}

/* ─── BADGE ─── */
.badge {
  padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
  font-family: 'JetBrains Mono', monospace; display: inline-flex; align-items: center;
  letter-spacing: -.02em;
}

/* ─── LAYOUT ─── */
.container { max-width: 1060px; margin: 0 auto; padding: 32px 24px; }
.grid { display: grid; gap: 16px; }
.grid-cards { grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); }
.grid-groups { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.grid-scores { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
.grid-indiv { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
.flex { display: flex; } .flex-col { flex-direction: column; } .flex-wrap { flex-wrap: wrap; }
.items-center { align-items: center; } .items-end { align-items: end; }
.justify-between { justify-content: space-between; } .justify-center { justify-content: center; }
.gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-5 { gap: 20px; }
.mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; } .mb-5 { margin-bottom: 20px; } .mb-6 { margin-bottom: 24px; } .mb-8 { margin-bottom: 32px; }
.mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-5 { margin-top: 20px; }
.text-center { text-align: center; } .text-right { text-align: right; }
.w-full { width: 100%; }
.hidden { display: none !important; }

/* ─── HEADER ─── */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border-light);
  padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm);
}
.header-title { font-size: 15px; font-weight: 600; letter-spacing: -.02em; color: var(--text); }
.header-divider { width: 1px; height: 20px; background: var(--border); }

/* ─── TABS ─── */
.tabs { display: flex; gap: 2px; margin-bottom: 28px; border-bottom: 1px solid var(--border-light); }
.tab {
  background: transparent; border: none; color: var(--text-muted); padding: 12px 18px;
  font-size: 14px; font-family: 'Outfit', sans-serif; font-weight: 500; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex;
  align-items: center; gap: 7px; transition: color .15s;
}
.tab:hover { color: var(--text-secondary); }
.tab-active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-active-student { color: var(--student); border-bottom-color: var(--student); }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.3);
  backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal {
  background: var(--surface); border-radius: 16px; width: 100%; max-width: 500px;
  max-height: 85vh; overflow: auto; padding: 32px; box-shadow: var(--shadow-lg);
}
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 24px; letter-spacing: -.02em; }

/* ─── PROGRESS ─── */
.progress { background: var(--border-light); border-radius: 4px; height: 4px; overflow: hidden; }
.progress-bar { height: 4px; border-radius: 4px; transition: width .5s ease; }

/* ─── TOAST ─── */
.toast {
  position: fixed; top: 20px; right: 20px; z-index: 9999; color: #fff;
  padding: 12px 22px; border-radius: var(--radius); font-size: 14px; font-weight: 600;
  box-shadow: var(--shadow-lg); animation: slideIn .3s ease;
}

/* ─── STAT ─── */
.stat { text-align: center; padding: 4px 0; }
.stat-value { font-size: 26px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -.04em; line-height: 1.1; }
.stat-label { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }

/* ─── SECTION LABEL ─── */
.section-label {
  font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light);
}

/* ─── RANKING ─── */
.rank-row {
  display: grid; grid-template-columns: 36px 2fr 60px 60px 1fr;
  gap: 12px; padding: 11px 16px; align-items: center; border-radius: 8px; font-size: 14px;
}
.rank-header {
  font-size: 11px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: .06em; font-weight: 600; padding: 8px 16px;
}

/* ─── MEMBER PILL ─── */
.member-pill {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--input-bg); border-radius: 8px; padding: 9px 14px;
  border: 1px solid var(--border-light); transition: border-color .15s;
}
.member-pill:hover { border-color: var(--border); }

/* ─── RESPONSIVE ─── */
@media (max-width: 640px) {
  .grid-cards { grid-template-columns: 1fr; }
  .grid-groups { grid-template-columns: 1fr; }
  .grid-assign { grid-template-columns: 1fr !important; }
  .rank-row { grid-template-columns: 28px 1fr 44px 44px; font-size: 13px; }
  .rank-row > *:last-child { display: none; }
  .container { padding: 24px 16px; }
  .login-grid { grid-template-columns: 1fr !important; }
  .stat-value { font-size: 22px; }
}
</style>
</head>
<body>

<div id="toast" class="toast hidden"></div>

<!-- ═══════════════════════════════════════════ -->
<!-- LOGIN -->
<!-- ═══════════════════════════════════════════ -->
<div id="login-screen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg-warm)">
  <div class="animate" style="width:100%;max-width:560px">
    <!-- Branding -->
    <div class="text-center mb-8">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:14px;background:var(--accent);color:#fff;margin-bottom:16px;box-shadow:0 2px 8px rgba(26,86,219,.3)">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 3h7a5 5 0 015 5v13a4 4 0 00-4-4H2zM22 3h-7a5 5 0 00-5 5v13a4 4 0 014-4h8z"/></svg>
      </div>
      <h1 style="font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px">Painel de Disciplinas</h1>
      <p style="color:var(--text-secondary);font-size:15px;font-weight:400">Prof. Carlos Augusto · UFDPar</p>
    </div>

    <!-- Cards -->
    <div class="grid login-grid" style="grid-template-columns:1fr 1fr;gap:16px">
      <!-- Professor -->
      <div class="card" style="padding:28px 24px">
        <div style="width:44px;height:44px;border-radius:12px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin-bottom:18px;color:var(--accent)">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="9" width="12" height="8" rx="2"/><path d="M7 9V6a3 3 0 016 0v3"/></svg>
        </div>
        <h3 style="font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em">Professor</h3>
        <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px">Acesso completo ao sistema</p>
        <input id="pin-input" type="password" class="input mono" placeholder="6 dígitos" maxlength="6" style="text-align:center;font-size:18px;letter-spacing:6px;margin-bottom:10px">
        <p id="pin-error" class="hidden" style="color:var(--danger);font-size:13px;margin-bottom:8px;text-align:center">PIN incorreto</p>
        <button class="btn btn-primary w-full" style="justify-content:center;height:42px" onclick="tryLogin()">Entrar</button>
      </div>

      <!-- Aluno -->
      <div class="card card-hover" style="padding:28px 24px;border-color:rgba(124,58,237,.12)" onclick="enterAsStudent()">
        <div style="width:44px;height:44px;border-radius:12px;background:var(--student-light);display:flex;align-items:center;justify-content:center;margin-bottom:18px;color:var(--student)">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 2L1 6.5l9 4.5 9-4.5-9-4.5zM1 6.5v6l9 4.5M19 6.5v6l-9 4.5"/></svg>
        </div>
        <h3 style="font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em">Aluno</h3>
        <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px">Grupo e pontuação</p>
        <div style="height:52px"></div>
        <button class="btn btn-student w-full" style="justify-content:center;height:42px;pointer-events:none">Acessar</button>
      </div>
    </div>

    <p class="text-center" style="color:var(--text-muted);font-size:12px;margin-top:20px">
      PIN padrão: <code class="mono" style="background:var(--border-light);padding:2px 6px;border-radius:4px;font-size:11px">abc123</code>
    </p>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- MAIN APP -->
<!-- ═══════════════════════════════════════════ -->
<div id="app" class="hidden">
  <header class="header">
    <button id="btn-back" class="btn btn-ghost hidden" onclick="goHome()" style="margin-right:-4px">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 8H4m0 0l3.5-3.5M4 8l3.5 3.5"/></svg> Voltar
    </button>
    <svg width="18" height="18" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><path d="M1.5 2h5a3.5 3.5 0 013.5 3.5v9.5a2.5 2.5 0 00-2.5-2.5h-6zM16.5 2h-5A3.5 3.5 0 008 5.5V15a2.5 2.5 0 012.5-2.5h6z"/></svg>
    <span class="header-title">Painel de Disciplinas</span>
    <span id="role-badge" class="badge" style="font-family:'Outfit',sans-serif;font-size:11px;font-weight:600"></span>
    <div style="flex:1"></div>
    <span style="font-size:12px;color:var(--text-muted);font-weight:500">Prof. Carlos Augusto</span>
    <div class="header-divider"></div>
    <button id="btn-refresh" class="btn btn-ghost btn-sm hidden" onclick="refreshData()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1v4h4M13 13V9H9"/><path d="M11.5 5A5.5 5.5 0 002 3.5L1 5M2.5 9a5.5 5.5 0 009.5 1.5L13 9"/></svg>
    </button>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Sair</button>
  </header>
  <div class="container"><div id="page-content"></div></div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- FIREBASE -->
<!-- ═══════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDOAd6kBjbVDCLb7fN8uflDcLXxYLaWghg",
  authDomain: "painel-de-disciplinas.firebaseapp.com",
  databaseURL: "https://painel-de-disciplinas-default-rtdb.firebaseio.com",
  projectId: "painel-de-disciplinas",
  storageBucket: "painel-de-disciplinas.firebasestorage.app",
  messagingSenderId: "737582040457",
  appId: "1:737582040457:web:7b831b71836a07a0408d58"
});
const db = firebase.database(), dataRef = db.ref('painel');

let STATE = { disciplinas: [], profPin: "abc123" };
let ROLE = null, VIEW = { page: "home" }, LISTENER = false;

function save() { dataRef.set(STATE); }
function attach() {
  if (LISTENER) return; LISTENER = true;
  dataRef.on('value', s => { const v = s.val(); if (v) { STATE = v; if (!STATE.disciplinas) STATE.disciplinas = []; render(); } });
}
dataRef.once('value').then(s => { const v = s.val(); if (v) { STATE = v; if (!STATE.disciplinas) STATE.disciplinas = []; } });

const gid = () => Math.random().toString(36).slice(2, 10);
function toast(m, t='success') {
  const e = document.getElementById('toast');
  e.textContent = m;
  e.style.background = t === 'success' ? 'var(--success)' : t === 'danger' ? 'var(--danger)' : 'var(--warn)';
  e.classList.remove('hidden');
  setTimeout(() => e.classList.add('hidden'), 2400);
}
function validPin(p) { return /^[a-zA-Z0-9]{6}$/.test(p); }
function fmtData(iso) {
  if (!iso) return '';
  const p = iso.split('-');
  if (p.length === 3) return p[2] + '/' + p[1] + '/' + p[0];
  return iso;
}
function parseData(str) {
  str = str.trim();
  // DD/MM/AAAA
  const br = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (br) return br[3] + '-' + br[2] + '-' + br[1];
  // AAAA-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  return null;
}
function disc(id) { return (STATE.disciplinas||[]).find(d => d.id === id); }
function vagas(d) {
  const v = {};
  for (let i = 1; i <= d.numGrupos; i++) v[i] = d.maxPorGrupo;
  if (d.grupos) Object.values(d.grupos).forEach(g => { if (v[g] !== undefined) v[g]--; });
  return v;
}
function semGrupo(d) { return (d.alunos||[]).filter(a => !d.grupos || !d.grupos[a.id]); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ─── AUTH ─── */
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
function tryLogin() {
  const p = document.getElementById('pin-input').value;
  if (p === STATE.profPin) { ROLE = 'prof'; document.getElementById('pin-input').value = ''; document.getElementById('pin-error').classList.add('hidden'); enter(); }
  else document.getElementById('pin-error').classList.remove('hidden');
}
function enterAsStudent() { ROLE = 'aluno'; enter(); }
function enter() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const b = document.getElementById('role-badge');
  b.textContent = ROLE === 'prof' ? 'Professor' : 'Aluno';
  b.style.background = ROLE === 'prof' ? 'var(--accent-light)' : 'var(--student-light)';
  b.style.color = ROLE === 'prof' ? 'var(--accent)' : 'var(--student)';
  document.getElementById('btn-refresh').classList.toggle('hidden', ROLE !== 'aluno');
  attach(); VIEW = { page: 'home' }; render();
}
function logout() { ROLE = null; VIEW = { page: 'home' }; document.getElementById('app').classList.add('hidden'); document.getElementById('login-screen').classList.remove('hidden'); }
function refreshData() { dataRef.once('value').then(s => { const v = s.val(); if (v) { STATE = v; if (!STATE.disciplinas) STATE.disciplinas = []; render(); } toast('Atualizado!'); }); }

/* ─── NAV ─── */
function goHome() { VIEW = { page: 'home' }; render(); }
function goDisc(id, tab) { VIEW = { page: 'disc', discId: id, tab: tab || (ROLE === 'prof' ? 'grupos' : 'grupo') }; render(); }
function setTab(t) { VIEW.tab = t; render(); }

/* ─── RENDER ─── */
function render() {
  const c = document.getElementById('page-content');
  document.getElementById('btn-back').classList.toggle('hidden', VIEW.page === 'home');
  if (VIEW.page === 'home') c.innerHTML = ROLE === 'prof' ? profHome() : alunoHome();
  else { const d = disc(VIEW.discId); if (!d) { goHome(); return; } c.innerHTML = ROLE === 'prof' ? profDisc(d) : alunoDisc(d); }
}

/* ═══ PROF HOME ═══ */
function profHome() {
  const ds = STATE.disciplinas || [];
  let cards = ds.map(d => {
    const sem = semGrupo(d).length, nA = (d.atividades||[]).length;
    return `<div class="card card-hover" onclick="goDisc('${d.id}')" style="position:relative">
      <div style="position:absolute;top:14px;right:14px" onclick="event.stopPropagation();delDisc('${d.id}')">
        <button class="btn btn-icon btn-ghost" style="color:var(--text-muted)">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 4h11M4.5 4V2.8a1 1 0 011-1h4a1 1 0 011 1V4m1.5 0v8a1.2 1.2 0 01-1.2 1.2H4.2A1.2 1.2 0 013 12V4"/></svg>
        </button>
      </div>
      <h3 style="font-size:17px;font-weight:700;letter-spacing:-.02em;margin-bottom:16px">${esc(d.nome)}</h3>
      <div class="flex gap-5" style="margin-bottom:16px">
        <div class="stat"><div class="stat-value" style="color:var(--accent)">${(d.alunos||[]).length}</div><div class="stat-label">Alunos</div></div>
        <div class="stat"><div class="stat-value" style="color:var(--success)">${d.numGrupos}</div><div class="stat-label">Grupos</div></div>
        <div class="stat"><div class="stat-value" style="color:${sem > 0 ? 'var(--warn)' : 'var(--success)'}">${sem}</div><div class="stat-label">Sem grupo</div></div>
      </div>
      <div class="flex gap-2">

if (!window._unlockedDiscs) window._unlockedDiscs = {};
function tryDiscPin(did) {
  const d = disc(did);
  const input = document.getElementById('dpin-' + did);
  const err = document.getElementById('dpin-err-' + did);
  if (!input) return;
  if (input.value === d.discPin) {
    window._unlockedDiscs[did] = true;
    err.classList.add('hidden');
    goDisc(did);
  } else {
    err.classList.remove('hidden');
  }
}

        <div class="section-label">Pontuação Individual</div><div class="grid grid-indiv">${ii}</div>

/* ═══ RANKING ═══ */
function rankTab(d) {
  const gS={}; for(let g=1;g<=d.numGrupos;g++) gS[g]=0;
  (d.atividades||[]).forEach(a => { if(a.pontuacoes) Object.entries(a.pontuacoes).forEach(([g,p]) => { gS[g]=(gS[g]||0)+(parseFloat(p)||0); }); });
  const gR = Object.entries(gS).map(([g,p])=>({grupo:+g,pts:p})).sort((a,b)=>b.pts-a.pts);
  const mG = Math.max(...gR.map(g=>g.pts),1);
  const aS = (d.alunos||[]).map(a => { const gr=d.grupos?d.grupos[a.id]:null; let p=0; (d.atividades||[]).forEach(at=>{if(gr&&at.pontuacoes&&at.pontuacoes[gr])p+=parseFloat(at.pontuacoes[gr])||0;if(at.individuais&&at.individuais[a.id])p+=parseFloat(at.individuais[a.id])||0;});return{...a,grupo:gr,pts:p};}).sort((a,b)=>b.pts-a.pts);
  const mA = Math.max(...aS.map(a=>a.pts),1), mode = window._rm||'grupos';

  let tog = `<div class="flex justify-between items-center mb-5">
    <h2 style="font-size:18px;font-weight:700">Ranking</h2>
    <div class="flex gap-1" style="background:var(--input-bg);border-radius:8px;padding:3px;border:1px solid var(--border-light)">
      <button class="btn btn-sm" style="background:${mode==='grupos'?'var(--accent)':'transparent'};color:${mode==='grupos'?'#fff':'var(--text-muted)'};border-radius:6px;box-shadow:none" onclick="window._rm='grupos';render()">Grupos</button>
      <button class="btn btn-sm" style="background:${mode==='indiv'?'var(--accent)':'transparent'};color:${mode==='indiv'?'#fff':'var(--text-muted)'};border-radius:6px;box-shadow:none" onclick="window._rm='indiv';render()">Individual</button>
    </div></div>`;

  if (mode==='grupos') {
    let rows = gR.map((g,i) => {
      const mem=(d.alunos||[]).filter(a=>d.grupos&&d.grupos[a.id]===g.grupo);
      const mc=['#ca8a04','#6b7280','#b45309'], bg=i<3?mc[i]:'var(--border)', fg=i<3?'#fff':'var(--text-muted)';
      let ns=mem.map(m=>`<span style="background:var(--input-bg);padding:2px 8px;border-radius:4px;font-size:12px;color:var(--text-secondary)">${esc(m.nome)}</span>`).join('');
      return `<div class="card" style="padding:16px 20px;margin-bottom:10px">
        <div class="flex items-center gap-4">
          <div class="mono" style="width:34px;height:34px;border-radius:9px;background:${bg};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:${fg};flex-shrink:0">${i+1}º</div>
          <div style="flex:1;min-width:0">
            <div class="flex justify-between items-center mb-2"><span style="font-weight:700;font-size:15px">Grupo ${g.grupo}</span><span class="mono" style="font-weight:700;font-size:20px;color:var(--accent)">${g.pts}</span></div>
            <div class="progress" style="height:5px;margin-bottom:8px"><div class="progress-bar" style="height:5px;width:${(g.pts/mG)*100}%;background:linear-gradient(90deg,var(--accent),var(--success))"></div></div>
            <div class="flex flex-wrap gap-2">${ns}</div>
          </div>
        </div>
      </div>`;
    }).join('');
    return tog + rows;
  } else {
    let hdr = `<div class="rank-row rank-header"><span>#</span><span>Aluno</span><span>Grupo</span><span>Pts</span><span></span></div>`;
    let rows = aS.map((a,i) => {
      const mc=['var(--warn)','var(--text-muted)','#b45309'];
      return `<div class="rank-row" style="background:${i%2===0?'var(--input-bg)':'transparent'}">
        <span class="mono" style="font-weight:700;color:${i<3?mc[i]:'var(--text-muted)'}">${i+1}</span>
        <span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.nome)}</span>
        <span class="badge" style="background:${a.grupo?'var(--accent-light)':'var(--danger-light)'};color:${a.grupo?'var(--accent)':'var(--danger)'}">${a.grupo?'G'+a.grupo:'—'}</span>
        <span class="mono" style="font-weight:700;color:var(--accent)">${a.pts}</span>
        <div class="progress"><div class="progress-bar" style="width:${(a.pts/mA)*100}%;background:var(--accent)"></div></div>
      </div>`;
    }).join('');
    return tog + hdr + rows;
  }
}

      </div>

    </div>`;
}

function saveP(){const p=document.getElementById('m-p').value,err=document.getElementById('pin-val-err');if(!validPin(p)){err.textContent='PIN deve ter exatamente 6 caracteres alfanuméricos';err.classList.remove('hidden');return;}STATE.profPin=p;save();closeM();toast('PIN atualizado!');}

function atribuir(did){
  const ai=document.getElementById('sel-a').value,gi=parseInt(document.getElementById('sel-g').value);
  if(!ai||!gi)return;const d=disc(did);if(!d.grupos)d.grupos={};const v=vagas(d);
  if(v[gi]<=0){toast('Grupo cheio!','danger');return;}
  if(d.grupos[ai]){toast('Já está em um grupo!','danger');return;}
  d.grupos[ai]=gi;save();toast(ROLE==='prof'?'Atribuído!':'Entrou no grupo!');
}
function rmGrupo(did,aid){const d=disc(did);if(d.grupos)delete d.grupos[aid];save();toast('Removido','warn');}
function resetG(did){if(!confirm('Resetar todos os grupos?'))return;disc(did).grupos={};save();toast('Grupos resetados','warn');}

function randomGrupos(did) {
  if (!confirm('Distribuir aleatoriamente todos os alunos sem grupo? Alunos já em grupos não serão movidos.')) return;
  const d = disc(did);
  if (!d.grupos) d.grupos = {};
  const sg = (d.alunos||[]).filter(a => !d.grupos[a.id]);
  if (sg.length === 0) { toast('Todos já estão em grupos!', 'warn'); return; }
  // Shuffle
  const shuffled = [...sg];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  // Calculate current vagas
  const v = {};
  for (let g = 1; g <= d.numGrupos; g++) v[g] = d.maxPorGrupo;
  Object.values(d.grupos).forEach(g => { if (v[g] !== undefined) v[g]--; });
  // Distribute
  let assigned = 0;
  for (const aluno of shuffled) {
    // Find group with most vagas (balances distribution)
    let bestG = null, bestV = 0;
    for (let g = 1; g <= d.numGrupos; g++) {
      if (v[g] > bestV) { bestV = v[g]; bestG = g; }
    }
    if (bestG && bestV > 0) {
      d.grupos[aluno.id] = bestG;
      v[bestG]--;
      assigned++;
    }
  }
  save();
  const sobra = sg.length - assigned;
  if (sobra > 0) toast(`${assigned} distribuídos, ${sobra} sem vaga!`, 'warn');
  else toast(`${assigned} alunos distribuídos aleatoriamente!`);
}

  document.body.insertAdjacentHTML('beforeend',`<div class="modal-overlay" onclick="closeM()"><div class="modal" style="max-width:540px" onclick="event.stopPropagation()">

    <div style="background:var(--input-bg);border:1px solid var(--border-light);border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--text-secondary);line-height:1.8">

    <div class="flex justify-between"><button class="btn btn-secondary" onclick="closeM()">Cancelar</button><button class="btn btn-primary" onclick="mkBulkAtv('${did}')">Adicionar</button></div>
  </div></div>`);
}
function mkBulkAtv(did){
  const text = document.getElementById('m-batv').value;
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;
  const d = disc(did); if (!d.atividades) d.atividades = [];
  const today = new Date().toISOString().slice(0, 10);
  let count = 0;
  lines.forEach(line => {
    let data = today, desc = '';
    if (line.includes(';')) {
      const parts = line.split(';').map(p => p.trim());
      const parsed = parseData(parts[0]);
      if (parsed) { data = parsed; desc = parts.slice(1).join('; '); }
      else { desc = line; }
    } else {
      const parsed = parseData(line.split(/\s+/)[0]);
      if (parsed) { data = parsed; desc = line.replace(line.split(/\s+/)[0], '').trim(); }
      else { desc = line; }
    }
    if (!desc) desc = 'Atividade ' + fmtData(data);
    d.atividades.push({ id: gid(), data: data, descricao: desc, pontuacoes: {}, individuais: {} });
    count++;
  });
  save(); closeM(); toast(count + ' atividade' + (count !== 1 ? 's' : '') + ' adicionada' + (count !== 1 ? 's' : '') + '!');
}
function delAtv(did,aid){if(!confirm('Excluir atividade?'))return;const d=disc(did);d.atividades=d.atividades.filter(a=>a.id!==aid);if(window._eid===aid)window._eid=null;save();toast('Excluída','danger');}

window._eid=null;

function saveCfg(did){const d=disc(did);const dp=document.getElementById('c-dp').value.trim();if(dp&&!validPin(dp)){toast('PIN deve ter 6 caracteres alfanuméricos','danger');return;}d.nome=document.getElementById('c-n').value.trim()||d.nome;d.numGrupos=parseInt(document.getElementById('c-ng').value)||d.numGrupos;d.maxPorGrupo=parseInt(document.getElementById('c-m').value)||d.maxPorGrupo;d.discPin=dp;save();toast('Salvo!');}
function addA(did){const i=document.getElementById('na'),n=i.value.trim();if(!n)return;const d=disc(did);if(!d.alunos)d.alunos=[];d.alunos.push({id:gid(),nome:n});i.value='';save();toast('Adicionado!');}
function bulkAdd(did){const t=document.getElementById('bk-t').value,ns=t.split('\n').map(l=>l.trim()).filter(Boolean).map(n=>({id:gid(),nome:n}));if(!ns.length)return;const d=disc(did);if(!d.alunos)d.alunos=[];d.alunos.push(...ns);document.getElementById('bk-t').value='';save();toast(ns.length+' adicionados!');}
function rmAluno(did,aid){const d=disc(did);d.alunos=d.alunos.filter(a=>a.id!==aid);if(d.grupos)delete d.grupos[aid];save();toast('Removido','warn');}

function closeM(){const o=document.querySelector('.modal-overlay');if(o)o.remove();}
window._rm='grupos';
